name: CI - Build & Push Backend Image

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          PORT: 3000
          SESSION_SECRET: test
          DATABASE_URL: postgres://dummy:dummy@localhost:5432/dummy
        run: npm run test

      - name: Set Environment Variables
        run: |
          VERSION=$(cat VERSION)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${REPO_LOWER}/finote-backend" >> $GITHUB_ENV

      - name: Set image tags
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            TAGS="${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ env.VERSION }},${{ env.IMAGE_NAME }}:${{ env.VERSION }}-${{ env.SHA }}"
          else
            TAGS="${{ env.IMAGE_NAME }}:dev,${{ env.IMAGE_NAME }}:${{ env.VERSION }}-dev-${{ env.SHA }}"
          fi
          echo "IMAGE_TAGS=$TAGS" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build & Load (locally) so Trivy can scan it before pushing
      - name: Build and load for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:tmp
          cache-from: type=gha

      # 2. Scan image with Trivy
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:tmp
          format: 'table'
          exit-code: '1' # Fails the build if vulnerabilities are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          vuln-type: library

      # 3. Push the validated image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Generate SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          artifact-name: sbom.spdx.json
          output-format: spdx-json